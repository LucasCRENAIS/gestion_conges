<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-touch-fullscreen" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Congés">
  <meta name="theme-color" content="#1e1b4b">
  
  <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/3652/3652191.png">
  <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/3652/3652191.png">
  <link id="manifest-link" rel="manifest">

  <title>Gestion Congés</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    :root { --sat: env(safe-area-inset-top); --sab: env(safe-area-inset-bottom); }
    
    .dark body { background-color: #0f172a; color: #f8fafc; }
    .dark .bg-white { background-color: #1e293b; border-color: #334155; }
    .dark .text-slate-800 { color: #f1f5f9; }
    .dark .text-slate-600 { color: #cbd5e1; }
    .dark .bg-slate-50 { background-color: #334155; color: #f1f5f9; }
    .dark nav { background-color: #1e293b; border-color: #334155; }

    body { 
      background-color: #f8fafc; margin: 0; overscroll-behavior-y: none; 
      -webkit-tap-highlight-color: transparent; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      transition: background-color 0.4s cubic-bezier(0.19, 1, 0.22, 1);
    }
    ::-webkit-scrollbar { display: none; }
    * { -webkit-user-select: none; user-select: none; box-sizing: border-box; }
    input, select { -webkit-user-select: auto; user-select: auto; outline: none; }
    .pt-safe { padding-top: calc(10px + var(--sat, 20px)); }
    .pb-safe-content { padding-bottom: calc(100px + var(--sab, 20px)); }
    
    .snappy-transition {
      transition: all 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    .snappy-transition:active {
      transform: scale(0.96);
    }
    
    .header-animate {
      transition: padding 0.3s ease-out, background-color 0.3s ease-out;
    }
    
    .view-transition-enter {
      animation: viewEnter 0.25s cubic-bezier(0.19, 1, 0.22, 1) forwards;
    }
    
    @keyframes viewEnter {
      from { opacity: 0; transform: scale(0.98) translateY(10px); }
      to { opacity: 1; transform: scale(1) translateY(0); }
    }

    @keyframes pulse-custom { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.5; transform: scale(1.1); } }
    .animate-pulse-fast { animation: pulse-custom 1s cubic-bezier(0.4, 0, 0.6, 1) infinite; }

    /* Sliding effect classes */
    .type-slider-transition {
      transition: transform 0.3s cubic-bezier(0.19, 1, 0.22, 1), background-color 0.3s ease;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useMemo, useEffect, useCallback, useRef } = React;

    const getHolidays = (year) => {
      const pad = n => String(n).padStart(2, '0');
      const fmt = d => `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
      const getEaster = (y) => {
        const f = Math.floor, G = y % 19, C = f(y / 100);
        const H = (C - f(C / 4) - f((8 * C + 13) / 25) + 19 * G + 15) % 30;
        const I = H - f(H / 28) * (1 - f(29 / (H + 1)) * f((21 - G) / 11));
        const J = (y + f(y / 4) + I + 2 - C + f(C / 4)) % 7;
        const L = I - J, m = 3 + f((L + 40) / 44), d = L + 28 - 31 * f(m / 4);
        return new Date(y, m - 1, d);
      };
      const easter = getEaster(year);
      const easterMon = new Date(easter); easterMon.setDate(easter.getDate() + 1);
      const asc = new Date(easter); asc.setDate(easter.getDate() + 39);
      const pentMon = new Date(easter); pentMon.setDate(easter.getDate() + 50);
      return [`${year}-01-01`, `${year}-05-01`, `${year}-05-08`, `${year}-07-14`, `${year}-08-15`, `${year}-11-01`, `${year}-11-11`, `${year}-12-25`, fmt(easterMon), fmt(asc), fmt(pentMon)];
    };

    const App = () => {
      const [viewDate, setViewDate] = useState(new Date());
      const [syncStatus, setSyncStatus] = useState('synced');
      const [activeTab, setActiveTab] = useState('calendar'); 
      const [isScrolled, setIsScrolled] = useState(false);

      const [data, setData] = useState(() => {
        const saved = localStorage.getItem('conges-toulouse-data-v3');
        if (saved) return JSON.parse(saved);
        return {
          targetDate: new Date().toISOString().split('T')[0],
          adjustments: { cp: 0, rtt: 0, seniority: 0, cet: 0 },
          toCet: { cp: 0, rtt: 0 },
          initialCet: 0,
          calendarLeaves: {},
          vacations: [],
          lastAnnualUpdate: null,
          settings: {
            zone: 'Zone C',
            rateCP: 2.5,
            rateRTT: 1.0,
            theme: 'system',
            expiryMonth: 5,
            expiryDay: 31
          }
        };
      });

      useEffect(() => {
        const root = window.document.documentElement;
        const applyTheme = (t) => {
          if (t === 'dark' || (t === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            root.classList.add('dark');
          } else {
            root.classList.remove('dark');
          }
        };
        applyTheme(data.settings?.theme || 'system');
        if (data.settings?.theme === 'system') {
          const mediaQuery = window.matchMedia('(prefers-color-scheme: dark)');
          const handleChange = () => applyTheme('system');
          mediaQuery.addEventListener('change', handleChange);
          return () => mediaQuery.removeEventListener('change', handleChange);
        }
      }, [data.settings?.theme]);

      useEffect(() => {
        const handleScroll = () => setIsScrolled(window.scrollY > 15);
        window.addEventListener('scroll', handleScroll, { passive: true });
        return () => window.removeEventListener('scroll', handleScroll);
      }, []);


      const fetchVacations = useCallback(async () => {
        setSyncStatus('saving');
        try {
          const currentYear = new Date().getFullYear();
          const zoneParam = encodeURIComponent(data.settings?.zone || 'Zone C');
          const url = `https://data.education.gouv.fr/api/explore/v2.1/catalog/datasets/fr-en-calendrier-scolaire/records?where=zones%3D%22${zoneParam}%22%20AND%20start_date%20%3E%20%22${currentYear - 1}-01-01%22&order_by=start_date%20DESC&limit=100`;
          const response = await fetch(url);
          const result = await response.json();
          if (result.results) {
            const formatted = result.results.map(r => {
              const rawStart = r.start_date.split('T')[0];
              const rawEnd = r.end_date.split('T')[0];
              const sDate = new Date(rawStart);
              sDate.setDate(sDate.getDate() + 1);
              const pad = n => String(n).padStart(2, '0');
              const fixedStart = `${sDate.getFullYear()}-${pad(sDate.getMonth() + 1)}-${pad(sDate.getDate())}`;
              return { start: fixedStart, end: rawEnd };
            });
            const today = new Date();
            setData(prev => ({
              ...prev,
              vacations: formatted,
              lastAnnualUpdate: today.getMonth() >= 6 ? String(today.getFullYear()) : prev.lastAnnualUpdate
            }));
          }
        } catch (e) { console.error(e); } finally { setSyncStatus('synced'); }
      }, [data.settings?.zone]);

      useEffect(() => {
        const currentYearInView = viewDate.getFullYear();
        const today = new Date();
        const isAfterJuly = today.getMonth() >= 6;
        const hasDataForYear = data.vacations?.some(v => v.start.startsWith(String(currentYearInView)));
        const needsAnnualUpdate = isAfterJuly && data.lastAnnualUpdate !== String(today.getFullYear());
        if (!hasDataForYear || needsAnnualUpdate) fetchVacations();
      }, [viewDate.getFullYear(), data.lastAnnualUpdate, fetchVacations]);

      useEffect(() => {
        setSyncStatus('saving');
        localStorage.setItem('conges-toulouse-data-v3', JSON.stringify(data));
        const timeout = setTimeout(() => setSyncStatus('synced'), 300);
        return () => clearTimeout(timeout);
      }, [data]);

      const updateField = (k, v) => setData(prev => ({ ...prev, [k]: v }));
      const updateNested = (c, f, v) => setData(prev => ({ ...prev, [c]: { ...(prev[c] || {}), [f]: v } }));
      const updateSetting = (f, v) => {
        setData(prev => ({ ...prev, settings: { ...(prev.settings || {}), [f]: v } }));
        if (f === 'zone') setData(prev => ({ ...prev, vacations: [], lastAnnualUpdate: null }));
      };

      const totals = useMemo(() => {
        const t = { cp: 0, rtt: 0, seniority: 0, cet: 0 };
        Object.values(data.calendarLeaves || {}).forEach(l => { if (t[l.type] !== undefined) t[l.type] += l.duration; });
        return t;
      }, [data.calendarLeaves]);

      const calcs = useMemo(() => {
        const sel = new Date(data.targetDate || new Date());
        const months = Math.max(0, (sel - new Date(sel.getFullYear(), 0, 1)) / (1000 * 60 * 60 * 24 * 30.44));
        const rateCP = data.settings?.rateCP ?? 2.5;
        const rateRTT = data.settings?.rateRTT ?? 1.0;
        const acqCP = months * rateCP, acqRTT = months * rateRTT;
        const adj = data.adjustments || { cp: 0, rtt: 0, seniority: 0, cet: 0 };
        const toCet = data.toCet || { cp: 0, rtt: 0 };
        
        return {
          cp: { acq: acqCP, bal: acqCP - totals.cp - Number(toCet.cp || 0) + Number(adj.cp || 0) },
          rtt: { acq: acqRTT, bal: acqRTT - totals.rtt - Number(toCet.rtt || 0) + Number(adj.rtt || 0) },
          sen: { acq: 1, bal: 1 - totals.seniority + Number(adj.seniority || 0) },
          cet: { bal: (Number(data.initialCet) || 0) + (Number(toCet.cp || 0) + Number(toCet.rtt || 0)) - totals.cet + Number(adj.cet || 0) }
        };
      }, [data, totals]);

      const exportToCalendar = () => {
        let ics = "BEGIN:VCALENDAR\nVERSION:2.0\nPRODID:-//Suivi Conges//FR\n";
        Object.entries(data.calendarLeaves || {}).forEach(([dateStr, leave]) => {
          const [y, m, d] = dateStr.split('-');
          const startDate = `${y}${m}${d}`;
          const nextDay = new Date(parseInt(y), parseInt(m) - 1, parseInt(d) + 1);
          const endDate = `${nextDay.getFullYear()}${String(nextDay.getMonth() + 1).padStart(2, '0')}${String(nextDay.getDate()).padStart(2, '0')}`;
          const typeName = leave.type.toUpperCase() === 'SENIORITY' ? 'ANCIENNETÉ' : leave.type.toUpperCase();
          ics += "BEGIN:VEVENT\n";
          ics += `DTSTART;VALUE=DATE:${startDate}\n`;
          ics += `DTEND;VALUE=DATE:${endDate}\n`;
          ics += `SUMMARY:Congé posé : ${typeName}${leave.duration === 0.5 ? ' (Demi-journée)' : ''}\n`;
          ics += "END:VEVENT\n";
        });
        ics += "END:VCALENDAR";
        const blob = new Blob([ics], { type: 'text/calendar;charset=utf-8' });
        const url = URL.createObjectURL(blob);
        const link = document.createElement('a');
        link.href = url; link.setAttribute('download', 'mes_conges.ics');
        document.body.appendChild(link); link.click(); document.body.removeChild(link);
      };

      const resetCalendar = () => updateField('calendarLeaves', {});

      const adj = data.adjustments || { cp: 0, rtt: 0, seniority: 0, cet: 0 };
      const toCet = data.toCet || { cp: 0, rtt: 0 };

      return (
        <div className="min-h-screen bg-slate-50 dark:bg-slate-900 pb-safe-content overflow-x-hidden">
          {activeTab === 'calendar' && (
            <header className={`bg-indigo-950 text-white pt-safe fixed top-0 left-0 right-0 z-50 rounded-b-[32px] shadow-2xl header-animate ${isScrolled ? 'pb-2' : 'pb-8'}`}>
              <div className="px-5">
                <div className={`flex justify-between items-center transition-all duration-300 ${isScrolled ? 'h-0 opacity-0 pointer-events-none overflow-hidden' : 'h-14 opacity-100 mb-2'}`}>
                  <div className="flex items-center gap-3">
                    <h1 className="text-xl font-black tracking-tight">Suivi Congés</h1>
                    <div className={`w-2 h-2 rounded-full ${syncStatus === 'synced' ? 'bg-emerald-400' : 'bg-amber-400 animate-pulse'}`}></div>
                  </div>
                  <div className="text-right">
                    <input type="date" value={data.targetDate || ""} onChange={(e) => updateField('targetDate', e.target.value)} className="bg-white/10 text-white rounded-xl border-none p-2 text-[10px] font-bold outline-none" />
                  </div>
                </div>

                <div className={`grid gap-2 transition-all duration-300 ${isScrolled ? 'grid-cols-3' : 'grid-cols-2'}`}>
                  <HeaderStat label="CP" val={calcs.cp.bal} isScrolled={isScrolled} adj={data.adjustments?.cp} onUpdate={v => updateNested('adjustments', 'cp', v)} />
                  <HeaderStat label="RTT" val={calcs.rtt.bal} isScrolled={isScrolled} adj={data.adjustments?.rtt} onUpdate={v => updateNested('adjustments', 'rtt', v)} />
                  {isScrolled && (
                    <div className="bg-white/5 rounded-xl border border-white/10 flex flex-col items-center justify-center">
                      <input type="date" value={data.targetDate || ""} onChange={(e) => updateField('targetDate', e.target.value)} className="bg-transparent text-white text-[11px] font-black outline-none w-full text-center" />
                    </div>
                  )}
                </div>
              </div>
            </header>
          )}
          <main className="p-5 space-y-6 max-w-md mx-auto -mt-6 pt-[14.25rem]">
            {activeTab === 'calendar' ? (
              <div key="view-calendar" className="view-transition-enter flex flex-col gap-6">
                <div className="bg-white dark:bg-slate-800 rounded-[32px] p-5 shadow-lg border border-slate-100 dark:border-slate-700 flex justify-between items-center transition-all hover:shadow-xl mt-4">
                  <div>
                    <h3 className="text-[10px] font-bold text-slate-400 uppercase tracking-[0.2em]">Ancienneté</h3>
                    <div className="text-2xl font-black text-slate-800 dark:text-slate-100">{calcs.sen.bal.toFixed(1)} <span className="text-sm font-normal text-slate-300">jours</span></div>
                  </div>
                  <div className="w-24 bg-slate-50 dark:bg-slate-900/50 p-2.5 rounded-2xl border border-slate-100 dark:border-slate-700">
                    <label className="text-[8px] font-black text-slate-400 block mb-1 uppercase text-center tracking-tighter">Ajustement</label>
                    <input 
                      type="number" step="0.5" 
                      value={adj.seniority === 0 ? "0" : (adj.seniority ?? "")} 
                      onChange={e => updateNested('adjustments', 'seniority', e.target.value === '' ? '' : parseFloat(e.target.value))} 
                      className="w-full bg-transparent text-sm font-black border-none p-0 focus:outline-none dark:text-white text-center" 
                    />
                  </div>
                </div>

                <div className="bg-slate-900 rounded-[32px] p-6 shadow-2xl text-white border border-slate-800 transition-all hover:shadow-indigo-500/10">
                  <div className="flex justify-between items-baseline mb-6">
                    <h3 className="text-[11px] font-bold text-slate-400 uppercase tracking-[0.2em]">Solde CET</h3>
                    <div className="text-4xl font-black text-indigo-400 tracking-tighter">{calcs.cet.bal.toFixed(1)} <span className="text-base font-normal text-white/40">j.</span></div>
                  </div>
                  <div className="grid grid-cols-2 gap-4 pt-4 border-t border-slate-800/50">
                    <DarkInput label="Initial" val={data.initialCet} setVal={v => updateField('initialCet', v)} />
                    <DarkInput label="Ajustement" val={adj.cet} setVal={v => updateNested('adjustments', 'cet', v)} />
                    <DarkInput label="+ RTT" val={toCet.rtt} setVal={v => updateNested('toCet', 'rtt', v)} highlight />
                    <DarkInput label="+ CP" val={toCet.cp} setVal={v => updateNested('toCet', 'cp', v)} highlight />
                  </div>
                </div>

                <CalendarWidget 
                  view={viewDate} 
                  setView={setViewDate} 
                  leaves={data.calendarLeaves || {}} 
                  setLeaves={v => updateField('calendarLeaves', v)} 
                  vacations={data.vacations || []}
                  zoneLabel={data.settings?.zone || 'Zone C'}
                  onExport={exportToCalendar} 
                  onReset={resetCalendar}
                />
              </div>
            ) : (
              <div key="view-settings" className="view-transition-enter">
                <SettingsPage settings={data.settings || {}} updateSetting={updateSetting} />
              </div>
            )}
          </main>

          <nav className="fixed bottom-0 left-0 right-0 bg-white/80 dark:bg-slate-800/80 backdrop-blur-md border-t border-slate-100/50 dark:border-slate-700/50 px-8 py-4 flex justify-around items-center z-20 pb-[calc(16px+var(--sab,0px))] transition-colors shadow-[0_-8px_30px_rgba(0,0,0,0.04)]">
            <TabButton active={activeTab === 'calendar'} label="Tableau" icon="calendar" onClick={() => setActiveTab('calendar')} />
            <TabButton active={activeTab === 'settings'} label="Options" icon="settings" onClick={() => setActiveTab('settings')} />
          </nav>
        </div>
      );
    };

    const TabButton = ({ active, label, icon, onClick }) => (
      <button onClick={onClick} className={`flex flex-col items-center gap-1.5 transition-all active:scale-90 ${active ? 'text-indigo-600' : 'text-slate-300 dark:text-slate-600'}`}>
        <div className={`p-2 rounded-2xl transition-all duration-300 ${active ? 'bg-indigo-50 dark:bg-indigo-900/40 shadow-inner' : ''}`}>
          {icon === 'calendar' ? (
            <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" strokeWidth="2.5"><path strokeLinecap="round" strokeLinejoin="round" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2-2v12a2 2 0 002 2z" /></svg>
          ) : (
            <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" strokeWidth="2.5"><path strokeLinecap="round" strokeLinejoin="round" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" /><path strokeLinecap="round" strokeLinejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /></svg>
          )}
        </div>
        <span className="text-[10px] font-black uppercase tracking-widest">{label}</span>
      </button>
    );

    const SettingsPage = ({ settings, updateSetting }) => {
      const zoneDescriptions = {
        'Zone A': 'Besançon, Bordeaux, Clermont-Ferrand, Dijon, Grenoble, Limoges, Lyon, Poitiers.',
        'Zone B': 'Aix-Marseille, Amiens, Lille, Nancy-Metz, Nantes, Nice, Normandie, Orléans-Tours, Reims, Rennes, Strasbourg.',
        'Zone C': 'Créteil, Montpellier, Paris, Toulouse, Versailles.'
      };

      return (
        <div className="space-y-6 py-2 pb-20">
          <section>
            <h2 className="text-sm font-black text-slate-800 dark:text-slate-200 uppercase tracking-widest mb-4 px-2">Affichage</h2>
            <div className="bg-white dark:bg-slate-800 rounded-[32px] p-6 shadow-sm border border-slate-100 dark:border-slate-700 space-y-4">
              <div>
                <label className="block text-[10px] font-bold text-slate-400 uppercase mb-4 tracking-tighter">Thème de l'application</label>
                <div className="grid grid-cols-3 gap-3">
                  {[{id:'light',label:'Clair'},{id:'dark',label:'Sombre'},{id:'system',label:'Auto'}].map(t => (
                    <button key={t.id} onClick={() => updateSetting('theme', t.id)} className={`py-4 rounded-2xl text-[11px] font-black transition-all duration-200 snappy-transition ${settings.theme === t.id ? 'bg-indigo-600 text-white shadow-lg' : 'bg-slate-50 dark:bg-slate-700 text-slate-400'}`}>{t.label}</button>
                  ))}
                </div>
              </div>
            </div>
          </section>

          <section>
            <h2 className="text-sm font-black text-slate-800 dark:text-slate-200 uppercase tracking-widest mb-4 px-2">Scolarité</h2>
            <div className="bg-white dark:bg-slate-800 rounded-[32px] p-6 shadow-sm border border-slate-100 dark:border-slate-700 space-y-5">
              <div>
                <label className="block text-[10px] font-bold text-slate-400 uppercase mb-4 tracking-tighter">Zone sélectionnée</label>
                <div className="grid grid-cols-3 gap-3 mb-5">
                  {['Zone A', 'Zone B', 'Zone C'].map(z => (
                    <button key={z} onClick={() => updateSetting('zone', z)} className={`py-4 rounded-2xl text-[11px] font-black transition-all duration-200 snappy-transition ${settings.zone === z ? 'bg-indigo-600 text-white shadow-lg' : 'bg-slate-50 dark:bg-slate-700 text-slate-400'}`}>{z}</button>
                  ))}
                </div>
                <div className="p-4 bg-slate-50 dark:bg-slate-900 rounded-[20px] border border-slate-100 dark:border-slate-700">
                  <p className="text-[10px] font-black text-indigo-500 dark:text-indigo-400 uppercase mb-2">Académies ({settings.zone || 'Zone C'})</p>
                  <p className="text-[11px] leading-relaxed text-slate-500 dark:text-slate-400 font-medium italic">
                    {zoneDescriptions[settings.zone || 'Zone C']}
                  </p>
                </div>
              </div>
            </div>
          </section>

          <section>
            <h2 className="text-sm font-black text-slate-800 dark:text-slate-200 uppercase tracking-widest mb-4 px-2">Acquisition Mensuelle</h2>
            <div className="bg-white dark:bg-slate-800 rounded-[32px] p-6 shadow-sm border border-slate-100 dark:border-slate-700 space-y-4">
              <div className="flex justify-between items-center">
                <span className="text-xs font-black text-slate-700 dark:text-slate-200">CP</span>
                <input type="number" step="0.1" value={settings.rateCP ?? ""} onChange={e => updateSetting('rateCP', e.target.value === '' ? '' : parseFloat(e.target.value))} className="w-20 bg-slate-50 dark:bg-slate-700 text-right p-4 rounded-2xl font-black text-indigo-600 border-none outline-none focus:ring-2 focus:ring-indigo-500 snappy-transition" />
              </div>
              <div className="flex justify-between items-center pt-4 border-t border-slate-100 dark:border-slate-700">
                <span className="text-xs font-black text-slate-700 dark:text-slate-200">RTT</span>
                <input type="number" step="0.1" value={settings.rateRTT ?? ""} onChange={e => updateSetting('rateRTT', e.target.value === '' ? '' : parseFloat(e.target.value))} className="w-20 bg-slate-50 dark:bg-slate-700 text-right p-4 rounded-2xl font-black text-emerald-600 border-none outline-none focus:ring-2 focus:ring-emerald-500 snappy-transition" />
              </div>
            </div>
          </section>
        </div>
      );
    };

    const HeaderStat = ({ label, val, isScrolled, adj, onUpdate }) => (
      <div className={`bg-white/10 rounded-2xl border border-white/10 flex transition-all duration-300 ${isScrolled ? 'p-2 flex-row items-center justify-center gap-2' : 'p-4 flex-col gap-2'}`}>
        <span className="font-black uppercase opacity-60 text-[9px] tracking-wider">{label}</span>
        <div className={`flex items-center transition-all ${isScrolled ? 'gap-1' : 'justify-between w-full'}`}>
          <div className={`font-black tracking-tighter ${isScrolled ? 'text-xl' : 'text-2xl'}`}>
            {Number(val || 0).toFixed(1)}<span className="text-[10px] font-normal opacity-40 ml-0.5">j.</span>
          </div>
          {!isScrolled && (
            <div className="bg-black/20 px-2 py-1 rounded-lg w-14">
              <input type="number" step="0.5" value={adj || "0"} onChange={e => onUpdate(parseFloat(e.target.value) || 0)} className="w-full bg-transparent text-[11px] font-black text-white text-center" />
            </div>
          )}
        </div>
      </div>
    );

    const DarkInput = ({ label, val, setVal, highlight }) => (
      <div className="bg-white/5 p-3 rounded-2xl text-center border border-white/5 snappy-transition hover:bg-white/10">
        <label className={`text-[8px] font-black uppercase block mb-1.5 ${highlight ? 'text-indigo-400' : 'text-slate-500'}`}>{label}</label>
        <input 
          type="number" step="0.5" 
          value={val === 0 ? "0" : (val ?? "")} 
          onChange={e => setVal(e.target.value === '' ? '' : parseFloat(e.target.value))} 
          className="w-full bg-transparent text-white text-sm font-black border-none p-0 focus:outline-none text-center" 
        />
      </div>
    );

    const CalendarWidget = ({ view, setView, leaves, setLeaves, vacations, zoneLabel, onExport, onReset }) => {
      const [type, setType] = useState('cp');
      const [dur, setDur] = useState(1);
      const touchStartX = useRef(null);
      const touchEndX = useRef(null);

      const y = view.getFullYear(), m = view.getMonth();
      const days = new Date(y, m+1, 0).getDate();
      const start = (new Date(y, m, 1).getDay() + 6) % 7;
      const months = ["Janvier", "Février", "Mars", "Avril", "Mai", "Juin", "Juillet", "Août", "Septembre", "Octobre", "Novembre", "Décembre"];
      const holidays = useMemo(() => getHolidays(y), [y]);
      const today = new Date();
      const todayId = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;

      const prevMonth = useCallback(() => setView(new Date(y, m-1, 1)), [y, m, setView]);
      const nextMonth = useCallback(() => setView(new Date(y, m+1, 1)), [y, m, setView]);

      const onTouchStart = (e) => { touchEndX.current = null; touchStartX.current = e.targetTouches[0].clientX; };
      const onTouchMove = (e) => { touchEndX.current = e.targetTouches[0].clientX; };
      const onTouchEnd = () => {
        if (!touchStartX.current || !touchEndX.current) return;
        const distance = touchStartX.current - touchEndX.current;
        if (Math.abs(distance) > 60) {
          if (distance > 0) nextMonth(); else prevMonth();
        }
      };

      const toggle = (d) => {
        const id = `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
        const dayOfWeek = new Date(y, m, d).getDay();
        if (dayOfWeek === 0 || dayOfWeek === 6 || holidays.includes(id)) return;
        if(navigator.vibrate) navigator.vibrate(8);
        const next = { ...leaves };
        if (next[id] && next[id].type === type) delete next[id];
        else next[id] = { type, duration: dur };
        setLeaves(next);
      };

      const typeConfigs = {
        cp: { color: 'bg-indigo-600', text: 'CP', offset: '0%' },
        rtt: { color: 'bg-emerald-500', text: 'RTT', offset: '25%' },
        seniority: { color: 'bg-amber-500', text: 'ANC.', offset: '50%' },
        cet: { color: 'bg-slate-700', text: 'CET', offset: '75%' }
      };

      return (
        <div 
          className="bg-white dark:bg-slate-800 rounded-[40px] p-6 shadow-xl border border-slate-100 dark:border-slate-700 transition-all touch-pan-y"
          onTouchStart={onTouchStart}
          onTouchMove={onTouchMove}
          onTouchEnd={onTouchEnd}
        >
          <div className="flex justify-between items-center mb-6 px-2">
             <button onClick={prevMonth} className="p-3 bg-slate-50 dark:bg-slate-900 rounded-2xl text-slate-400 hover:text-indigo-600 snappy-transition shadow-sm"><svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" strokeWidth="3"><path strokeLinecap="round" strokeLinejoin="round" d="M15 19l-7-7 7-7" /></svg></button>
             <span className="text-xs font-black uppercase tracking-[0.2em] text-slate-800 dark:text-slate-100">{months[m]} {y}</span>
             <button onClick={nextMonth} className="p-3 bg-slate-50 dark:bg-slate-900 rounded-2xl text-slate-400 hover:text-indigo-600 snappy-transition shadow-sm"><svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" strokeWidth="3"><path strokeLinecap="round" strokeLinejoin="round" d="M9 5l7 7-7 7" /></svg></button>
          </div>

          <div className="grid grid-cols-7 gap-1.5 mb-8">
            {['L','M','M','J','V','S','D'].map((d, i) => <div key={`day-${i}`} className="text-center text-[10px] font-black text-slate-300 dark:text-slate-600 py-1">{d}</div>)}
            {Array.from({length:start}).map((_,i) => <div key={`empty-${i}`} />)}
            {Array.from({length:days}).map((_,i) => {
              const d = i+1; const id = `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
              const l = leaves[id]; const isHoliday = holidays.includes(id); 
              const isVacation = vacations.some(v => id >= v.start && id <= v.end);
              const isToday = id === todayId;
              const isWeekend = new Date(y,m,d).getDay() === 0 || new Date(y,m,d).getDay() === 6;
              
              let btnClass = 'relative h-[42px] w-full rounded-2xl text-[12px] font-black transition-all snappy-transition flex items-center justify-center ';
              if (isWeekend) btnClass += 'bg-slate-50 dark:bg-slate-900/50 opacity-30 text-slate-400 cursor-not-allowed'; 
              else if (isHoliday) btnClass += 'bg-rose-50 dark:bg-rose-900/20 text-rose-500';
              else if (l) {
                if (l.type === 'cp') btnClass += 'bg-indigo-600 text-white shadow-lg shadow-indigo-100 dark:shadow-none scale-105 z-[1]';
                else if (l.type === 'rtt') btnClass += 'bg-emerald-500 text-white shadow-lg shadow-emerald-100 dark:shadow-none scale-105 z-[1]';
                else if (l.type === 'seniority') btnClass += 'bg-amber-500 text-white shadow-lg shadow-amber-100 dark:shadow-none scale-105 z-[1]';
                else btnClass += 'bg-slate-700 text-white scale-105 z-[1]';
              } else {
                btnClass += 'bg-slate-50 dark:bg-slate-900/80 text-slate-700 dark:text-slate-300';
              }
              
              return (
                <button key={d} onClick={() => toggle(d)} className={`${btnClass} ${isToday && !l ? 'ring-2 ring-indigo-500 ring-offset-2 dark:ring-offset-slate-800' : ''}`}>
                  {d}{l?.duration === 0.5 && <span className="absolute -top-1 -right-1 text-[8px] bg-white dark:bg-slate-800 text-indigo-600 rounded-full w-4 h-4 border border-indigo-100 flex items-center justify-center font-black">½</span>}
                  {isHoliday && <span className="text-[5px] absolute bottom-1 left-0 right-0 font-black tracking-tighter opacity-70">FÉRIÉ</span>}
                  {isVacation && !l && !isHoliday && <div className="absolute top-1.5 right-1.5 w-1 h-1 bg-indigo-300 dark:bg-indigo-500 rounded-full"></div>}
                </button>
              );
            })}
          </div>

          <div className="space-y-4">
            {/* Nouveau sélecteur de type avec effet de glissement */}
            <div className="bg-slate-50 dark:bg-slate-900 p-1.5 rounded-[24px] relative flex overflow-hidden">
              <div 
                className={`absolute top-1.5 bottom-1.5 left-[1.5%] w-[23.5%] rounded-[18px] shadow-lg type-slider-transition ${typeConfigs[type].color}`}
                style={{ transform: `translateX(${Object.keys(typeConfigs).indexOf(type) * 102}%)` }}
              ></div>
              
              {Object.entries(typeConfigs).map(([key, cfg]) => (
                <button 
                  key={key} 
                  onClick={() => setType(key)} 
                  className={`relative z-[1] flex-1 py-3 text-[10px] font-black uppercase tracking-wider transition-colors duration-300 ${type === key ? 'text-white' : 'text-slate-400 hover:text-slate-500'}`}
                >
                  {cfg.text}
                </button>
              ))}
            </div>

            <div className="flex gap-2">
              {[
                {v: 1, l: 'JOUR'}, 
                {v: 0.5, l: 'DEMI'}
              ].map(item => (
                <button 
                  key={item.v} 
                  onClick={() => setDur(item.v)} 
                  className={`flex-1 py-3.5 rounded-xl text-[10px] font-black uppercase tracking-widest border-2 transition-all snappy-transition ${dur === item.v ? 'border-indigo-600 bg-indigo-50 text-indigo-700 dark:bg-indigo-900/20 shadow-sm' : 'border-transparent bg-slate-50 dark:bg-slate-900 text-slate-400'}`}
                >
                  {item.l}
                </button>
              ))}
            </div>

            <div className="flex items-center justify-between pt-4 border-t border-slate-50/50 dark:border-slate-700/50">
              <div className="flex items-center gap-2 text-[9px] text-slate-400 font-black uppercase tracking-tight opacity-70"><div className="w-1 h-1 bg-indigo-300 rounded-full"></div> Vacances {zoneLabel}</div>
              <div className="flex items-center gap-2">
                <button onClick={onExport} className="px-5 py-3 bg-slate-900 text-white rounded-xl text-[9px] font-black uppercase tracking-widest snappy-transition shadow-md">
                  Export .ics
                </button>
                <button onClick={onReset} className="p-3 bg-rose-50 dark:bg-rose-900/20 text-rose-500 rounded-xl snappy-transition shadow-sm">
                  <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" strokeWidth="2.5"><path strokeLinecap="round" strokeLinejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1-1v3M4 7h16" /></svg>
                </button>
              </div>
            </div>
          </div>
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);

    window.addEventListener('load', () => {
      const manifest = { 
        name: "Gestion Congés", 
        short_name: "Congés", 
        start_url: window.location.href, 
        display: "standalone", 
        background_color: "#1e1b4b", 
        theme_color: "#1e1b4b", 
        icons: [{ src: "https://cdn-icons-png.flaticon.com/512/3652/3652191.png", sizes: "512x512", type: "image/png" }] 
      };
      const manifestBlob = new Blob([JSON.stringify(manifest)], {type: 'application/json'});
      const manifestUrl = URL.createObjectURL(manifestBlob);
      document.getElementById('manifest-link').href = manifestUrl;
    });
  </script>
</body>
</html>
