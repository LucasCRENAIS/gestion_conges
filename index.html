<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  
  <!-- Configuration PWA pour affichage plein écran -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Congés">
  
  <!-- Couleur de la barre d'état (iPhone/Android) -->
  <meta name="theme-color" content="#1e1b4b">
  
  <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/2370/2370264.png">
  <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/2370/2370264.png">

  <!-- Manifest JSON corrigé pour le mode standalone -->
  <link rel="manifest" href='data:application/json,{"name":"Suivi Congés Toulouse","short_name":"Congés","start_url":"./index.html","display":"standalone","orientation":"portrait","background_color":"#1e1b4b","theme_color":"#1e1b4b","icons":[{"src":"https://cdn-icons-png.flaticon.com/512/2370/2370264.png","sizes":"512x512","type":"image/png","purpose":"any maskable"}]}'>

  <title>Congés Toulouse</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    :root {
      --sat: env(safe-area-inset-top);
      --sab: env(safe-area-inset-bottom);
    }
    body { 
      background-color: #f8fafc; 
      margin: 0; 
      overscroll-behavior-y: none; 
      -webkit-tap-highlight-color: transparent; 
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }
    ::-webkit-scrollbar { display: none; }
    * { -webkit-user-select: none; user-select: none; box-sizing: border-box; }
    input { -webkit-user-select: auto; user-select: auto; outline: none; }
    
    /* On utilise les safe-areas pour éviter que l'encoche du téléphone coupe le texte */
    .pt-safe { padding-top: calc(10px + var(--sat, 20px)); }
    .pb-safe { padding-bottom: calc(20px + var(--sab, 20px)); }
    
    @keyframes pulse-custom { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.5; transform: scale(1.1); } }
    .animate-pulse-fast { animation: pulse-custom 1s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useMemo, useEffect, useCallback } = React;

    const firebaseConfig = JSON.parse(typeof __firebase_config !== 'undefined' ? __firebase_config : '{"projectId":"dummy"}');
    if (!firebase.apps.length && firebaseConfig.projectId !== "dummy") {
      firebase.initializeApp(firebaseConfig);
    }
    const db = firebase.apps.length ? firebase.firestore() : null;
    const auth = firebase.apps.length ? firebase.auth() : null;
    const appId = typeof __app_id !== 'undefined' ? __app_id : 'tracker-toulouse-v1';

    const getSchoolVacations = (year) => {
      const pad = n => String(n).padStart(2, '0');
      const fmt = (y, m, d) => `${y}-${pad(m)}-${pad(d)}`;
      const getEasterDate = (y) => {
        const f = Math.floor, G = y % 19, C = f(y / 100);
        const H = (C - f(C / 4) - f((8 * C + 13) / 25) + 19 * G + 15) % 30;
        const I = H - f(H / 28) * (1 - f(29 / (H + 1)) * f((21 - G) / 11));
        const J = (y + f(y / 4) + I + 2 - C + f(C / 4)) % 7;
        const L = I - J, m = 3 + f((L + 40) / 44), d = L + 28 - 31 * f(m / 4);
        return new Date(y, m - 1, d);
      };
      const easter = getEasterDate(year);
      const winterStart = new Date(year, 1, 15); while(winterStart.getDay() !== 6) winterStart.setDate(winterStart.getDate() + 1);
      const winterEnd = new Date(winterStart); winterEnd.setDate(winterEnd.getDate() + 16);
      const springStart = new Date(easter); springStart.setDate(easter.getDate() + 7); while(springStart.getDay() !== 6) springStart.setDate(springStart.getDate() + 1);
      const springEnd = new Date(springStart); springEnd.setDate(springStart.getDate() + 16);
      const dFmt = (d) => fmt(d.getFullYear(), d.getMonth() + 1, d.getDate());
      return [
        { start: dFmt(winterStart), end: dFmt(winterEnd) }, 
        { start: dFmt(springStart), end: dFmt(springEnd) }, 
        { start: fmt(year, 7, 5), end: fmt(year, 8, 31) },  
        { start: fmt(year, 10, 18), end: fmt(year, 11, 3) }, 
        { start: fmt(year, 12, 20), end: fmt(year + 1, 1, 5) }, 
        { start: fmt(year - 1, 12, 20), end: fmt(year, 1, 5) }  
      ];
    };

    const getHolidays = (year) => {
      const pad = n => String(n).padStart(2, '0');
      const fmt = d => `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
      const getEaster = (y) => {
        const f = Math.floor, G = y % 19, C = f(y / 100);
        const H = (C - f(C / 4) - f((8 * C + 13) / 25) + 19 * G + 15) % 30;
        const I = H - f(H / 28) * (1 - f(29 / (H + 1)) * f((21 - G) / 11));
        const J = (y + f(y / 4) + I + 2 - C + f(C / 4)) % 7;
        const L = I - J, m = 3 + f((L + 40) / 44), d = L + 28 - 31 * f(m / 4);
        return new Date(y, m - 1, d);
      };
      const easter = getEaster(year);
      const easterMon = new Date(easter); easterMon.setDate(easter.getDate() + 1);
      const asc = new Date(easter); asc.setDate(easter.getDate() + 39);
      const pentMon = new Date(easter); pentMon.setDate(easter.getDate() + 50);
      return [`${year}-01-01`, `${year}-05-01`, `${year}-05-08`, `${year}-07-14`, `${year}-08-15`, `${year}-11-01`, `${year}-11-11`, `${year}-12-25`, fmt(easterMon), fmt(asc), fmt(pentMon)];
    };

    const App = () => {
      const [user, setUser] = useState(null);
      const [loading, setLoading] = useState(true);
      const [syncStatus, setSyncStatus] = useState('synced');
      const [data, setData] = useState({
        targetDate: new Date().toISOString().split('T')[0],
        taken: { cp: 0, rtt: 0, seniority: 0, cet: 0 },
        toCet: { cp: 0, rtt: 0 },
        initialCet: 0,
        calendarLeaves: {}
      });

      useEffect(() => {
        if (!auth) { setLoading(false); return; }
        const init = async () => {
          try {
            let currentUser;
            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
              const res = await auth.signInWithCustomToken(__initial_auth_token);
              currentUser = res.user;
            } else {
              const res = await auth.signInAnonymously();
              currentUser = res.user;
            }
            setUser(currentUser);
            const unsub = db.doc(`/artifacts/${appId}/users/${currentUser.uid}/settings/main`).onSnapshot((doc) => {
              if (doc.exists) setData(p => ({ ...p, ...doc.data() }));
              setLoading(false);
              setSyncStatus('synced');
            }, () => { setLoading(false); setSyncStatus('error'); });
            return () => unsub();
          } catch (e) { setLoading(false); setSyncStatus('error'); }
        };
        init();
      }, []);

      const persist = useCallback((n) => {
        if (!user || !db) return;
        setSyncStatus('saving');
        db.doc(`/artifacts/${appId}/users/${user.uid}/settings/main`).set(n, { merge: true })
          .then(() => setSyncStatus('synced'))
          .catch(() => setSyncStatus('error'));
      }, [user]);

      const updateField = (k, v) => { const n = { ...data, [k]: v }; setData(n); persist(n); };
      const updateNested = (c, f, v) => { const n = { ...data, [c]: { ...data[c], [f]: v } }; setData(n); persist(n); };

      const totals = useMemo(() => {
        const t = { cp: 0, rtt: 0, seniority: 0, cet: 0 };
        Object.values(data.calendarLeaves || {}).forEach(l => { if (t[l.type] !== undefined) t[l.type] += l.duration; });
        return t;
      }, [data.calendarLeaves]);

      const calcs = useMemo(() => {
        const sel = new Date(data.targetDate);
        const months = Math.max(0, (sel - new Date(sel.getFullYear(), 0, 1)) / (1000 * 60 * 60 * 24 * 30.44));
        const acqCP = months * 2.5, acqRTT = months * 1.0;
        return {
          cp: { acq: acqCP, bal: acqCP - (data.taken.cp + totals.cp + data.toCet.cp) },
          rtt: { acq: acqRTT, bal: acqRTT - (data.taken.rtt + totals.rtt + data.toCet.rtt) },
          sen: { acq: 1, bal: 1 - (data.taken.seniority + totals.seniority) },
          cet: { bal: (data.initialCet || 0) + (data.toCet.cp + data.toCet.rtt) - (data.taken.cet + totals.cet) }
        };
      }, [data, totals]);

      if (loading) return <div className="min-h-screen bg-slate-900 flex items-center justify-center"><div className="w-8 h-8 border-2 border-indigo-500 border-t-transparent rounded-full animate-spin"></div></div>;

      return (
        <div className="min-h-screen bg-slate-50 pb-safe">
          <header className="bg-indigo-950 text-white pt-safe pb-8 px-5 rounded-b-[40px] shadow-2xl sticky top-0 z-10">
            <div className="flex justify-between items-center mb-6">
              <div className="flex items-center gap-3">
                <h1 className="text-xl font-bold tracking-tight">Congés & CET</h1>
                <div className={`w-2.5 h-2.5 rounded-full transition-colors duration-500 ${syncStatus === 'synced' ? 'bg-emerald-400 shadow-[0_0_8px_rgba(52,211,153,0.6)]' : syncStatus === 'saving' ? 'bg-amber-400 animate-pulse-fast' : 'bg-rose-500'}`}></div>
              </div>
              <div className="text-right">
                <label className="block text-[10px] text-indigo-300 font-bold uppercase mb-1">Projection :</label>
                <div className="relative">
                    <input type="date" value={data.targetDate} onChange={(e) => updateField('targetDate', e.target.value)} className="bg-indigo-900 text-white rounded-xl border-none p-2 text-xs font-bold appearance-none" />
                </div>
              </div>
            </div>
            <div className="grid grid-cols-2 gap-3">
              <HeaderStat label="Solde CP" val={calcs.cp.bal} acq={calcs.cp.acq} taken={data.taken.cp} onUpdate={v => updateNested('taken', 'cp', v)} />
              <HeaderStat label="Solde RTT" val={calcs.rtt.bal} acq={calcs.rtt.acq} taken={data.taken.rtt} onUpdate={v => updateNested('taken', 'rtt', v)} />
            </div>
          </header>

          <div className="p-4 space-y-4 max-w-md mx-auto">
            <div className="bg-white rounded-2xl p-4 shadow-sm border border-slate-100 flex justify-between items-center">
              <div>
                <h3 className="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Ancienneté</h3>
                <div className="text-xl font-black text-slate-800">{calcs.sen.bal.toFixed(1)} <span className="text-xs font-normal text-slate-300">j.</span></div>
              </div>
              <div className="w-24 bg-slate-50 p-2 rounded-xl">
                <label className="text-[7px] font-bold text-slate-400 block mb-0.5 uppercase">Pris (man.)</label>
                <input type="number" step="0.5" value={data.taken.seniority} onChange={e => updateNested('taken', 'seniority', parseFloat(e.target.value) || 0)} className="w-full bg-transparent text-xs font-black border-none p-0 focus:outline-none" />
              </div>
            </div>

            <div className="bg-slate-900 rounded-3xl p-5 shadow-lg text-white">
              <h3 className="text-[11px] font-bold text-slate-400 uppercase tracking-widest mb-1">Solde CET</h3>
              <div className="text-3xl font-black text-indigo-400 mb-4">{calcs.cet.bal.toFixed(1)} <span className="text-sm font-normal text-white/50">j.</span></div>
              <div className="grid grid-cols-2 gap-3 pt-3 border-t border-slate-800">
                <DarkInput label="Stock initial" val={data.initialCet} setVal={v => updateField('initialCet', v)} />
                <DarkInput label="Pris (manuel)" val={data.taken.cet} setVal={v => updateNested('taken', 'cet', v)} />
                <DarkInput label="+ RTT versés" val={data.toCet.rtt} setVal={v => updateNested('toCet', 'rtt', v)} highlight />
                <DarkInput label="+ CP versés" val={data.toCet.cp} setVal={v => updateNested('toCet', 'cp', v)} highlight />
              </div>
            </div>

            <CalendarWidget leaves={data.calendarLeaves} setLeaves={v => updateField('calendarLeaves', v)} />
          </div>
        </div>
      );
    };

    const HeaderStat = ({ label, val, acq, taken, onUpdate }) => (
      <div className="bg-white/5 p-3 rounded-2xl border border-white/10 flex flex-col">
        <h3 className="text-[10px] font-bold uppercase mb-1 opacity-50">{label}</h3>
        <div className="text-xl font-black tracking-tight">{val.toFixed(1)} <span className="text-xs font-normal opacity-30">j.</span></div>
        <p className="text-[8px] mt-1 mb-2 opacity-30 font-bold tracking-tighter uppercase">Acquis : {acq.toFixed(1)}</p>
        <div className="mt-auto bg-black/30 p-1.5 rounded-xl">
            <label className="block text-[7px] font-bold text-indigo-400 uppercase mb-0.5">Ajustement</label>
            <input type="number" step="0.5" value={taken} onChange={e => onUpdate(parseFloat(e.target.value) || 0)} className="w-full bg-transparent text-[11px] font-black text-white border-none p-0 focus:outline-none" />
        </div>
      </div>
    );

    const DarkInput = ({ label, val, setVal, highlight }) => (
      <div className="bg-white/5 p-2 rounded-xl">
        <label className={`text-[8px] font-bold uppercase block mb-0.5 ${highlight ? 'text-indigo-400' : 'text-slate-500'}`}>{label}</label>
        <input type="number" step="0.5" value={val} onChange={e => setVal(parseFloat(e.target.value) || 0)} className="w-full bg-transparent text-white text-xs font-bold border-none p-0 focus:outline-none" />
      </div>
    );

    const CalendarWidget = ({ leaves, setLeaves }) => {
      const [view, setView] = useState(new Date());
      const [type, setType] = useState('cp');
      const [dur, setDur] = useState(1);
      const y = view.getFullYear(), m = view.getMonth();
      const days = new Date(y, m+1, 0).getDate();
      const start = (new Date(y, m, 1).getDay() + 6) % 7;
      const months = ["Janvier", "Février", "Mars", "Avril", "Mai", "Juin", "Juillet", "Août", "Septembre", "Octobre", "Novembre", "Décembre"];
      const holidays = useMemo(() => getHolidays(y), [y]);
      const vacations = useMemo(() => getSchoolVacations(y), [y]);
      const toggle = (d) => {
        const id = `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
        if (holidays.includes(id)) return;
        const next = { ...leaves };
        if (next[id] && next[id].type === type) delete next[id];
        else next[id] = { type, duration: dur };
        if(navigator.vibrate) navigator.vibrate(10);
        setLeaves(next);
      };
      return (
        <div className="bg-white rounded-3xl p-5 shadow-sm border border-slate-100">
          <div className="flex justify-between items-center mb-6 px-2">
             <button onClick={() => setView(new Date(y, m-1, 1))} className="p-2 bg-slate-50 rounded-xl text-slate-400 active:bg-slate-200 transition-colors"><svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2.5" d="M15 19l-7-7 7-7" /></svg></button>
             <span className="text-xs font-black uppercase tracking-widest text-slate-800">{months[m]} {y}</span>
             <button onClick={() => setView(new Date(y, m+1, 1))} className="p-2 bg-slate-50 rounded-xl text-slate-400 active:bg-slate-200 transition-colors"><svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2.5" d="M9 5l7 7-7 7" /></svg></button>
          </div>
          <div className="grid grid-cols-7 gap-1.5 mb-6">
            {['L','M','M','J','V','S','D'].map(d => <div key={d} className="text-center text-[9px] font-black text-slate-200 py-1">{d}</div>)}
            {Array.from({length:start}).map((_,i) => <div key={i} />)}
            {Array.from({length:days}).map((_,i) => {
              const d = i+1; const id = `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
              const l = leaves[id]; const isHoliday = holidays.includes(id); const isVacation = vacations.some(v => id >= v.start && id <= v.end);
              let bgColor = 'bg-slate-50 text-slate-600';
              if (isHoliday) bgColor = 'bg-rose-50 text-rose-400';
              else if (l) bgColor = {cp:'bg-indigo-600 text-white shadow-lg shadow-indigo-200', rtt:'bg-emerald-500 text-white shadow-lg shadow-emerald-200', seniority:'bg-amber-500 text-white shadow-lg shadow-amber-200', cet:'bg-slate-900 text-white shadow-lg shadow-slate-300'}[l.type];
              return (
                <button key={d} onClick={() => toggle(d)} className={`relative flex flex-col items-center justify-center h-11 rounded-2xl text-[11px] font-black transition-all active:scale-90 ${bgColor}`}>
                  {d}{l?.duration === 0.5 && '*'}
                  {isHoliday && <span className="text-[5px] absolute bottom-1 font-bold">FÉRIÉ</span>}
                  {isVacation && !l && !isHoliday && <div className="absolute top-1 right-1 w-1.5 h-1.5 bg-indigo-300 rounded-full animate-pulse"></div>}
                </button>
              );
            })}
          </div>
          <div className="space-y-3">
            <div className="grid grid-cols-4 gap-1.5">
              {['cp', 'rtt', 'seniority', 'cet'].map(t => <button key={t} onClick={() => setType(t)} className={`py-2.5 rounded-xl text-[9px] font-black uppercase transition-all ${type === t ? 'bg-slate-900 text-white scale-105' : 'bg-slate-50 text-slate-400'}`}>{t === 'seniority' ? 'ANC.' : t}</button>)}
            </div>
            <div className="flex gap-1.5">
              {[1, 0.5].map(v => <button key={v} onClick={() => setDur(v)} className={`flex-1 py-2 rounded-xl text-[9px] font-black uppercase transition-all ${dur === v ? 'bg-indigo-100 text-indigo-700' : 'bg-slate-50 text-slate-400'}`}>{v === 1 ? '1 Jour' : '0.5 Jour'}</button>)}
            </div>
            <div className="flex items-center gap-2 pt-1 text-[9px] text-slate-300 font-bold uppercase italic"><div className="w-1.5 h-1.5 bg-indigo-200 rounded-full"></div> Toulouse (Zone C)</div>
          </div>
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);

    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        const swCode = `
          self.addEventListener('install', e => self.skipWaiting());
          self.addEventListener('fetch', e => e.respondWith(fetch(e.request)));
        `;
        const blob = new Blob([swCode], {type: 'text/javascript'});
        navigator.serviceWorker.register(URL.createObjectURL(blob)).catch(() => {});
      });
    }
  </script>
</body>
</html>
