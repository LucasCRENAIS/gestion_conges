<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Congés">
  <meta name="theme-color" content="#1e1b4b">
  
  <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/3652/3652191.png">
  <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/3652/3652191.png">
  <link id="manifest-link" rel="manifest">

  <title>Gestion Congés</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    :root { --sat: env(safe-area-inset-top); --sab: env(safe-area-inset-bottom); }
    
    /* Support Thème Sombre Natif Tailwind/CSS */
    .dark body { background-color: #0f172a; color: #f8fafc; }
    .dark .bg-white { background-color: #1e293b; border-color: #334155; }
    .dark .text-slate-800 { color: #f1f5f9; }
    .dark .text-slate-600 { color: #cbd5e1; }
    .dark .bg-slate-50 { background-color: #334155; color: #f1f5f9; }
    .dark nav { background-color: #1e293b; border-color: #334155; }

    body { 
      background-color: #f8fafc; margin: 0; overscroll-behavior-y: none; 
      -webkit-tap-highlight-color: transparent; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      transition: background-color 0.3s ease;
    }
    ::-webkit-scrollbar { display: none; }
    * { -webkit-user-select: none; user-select: none; box-sizing: border-box; }
    input, select { -webkit-user-select: auto; user-select: auto; outline: none; }
    .pt-safe { padding-top: calc(10px + var(--sat, 20px)); }
    /* Augmentation du padding bottom pour éviter le contact avec le footer */
    .pb-safe-content { padding-bottom: calc(100px + var(--sab, 20px)); }
    
    @keyframes pulse-custom { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.5; transform: scale(1.1); } }
    .animate-pulse-fast { animation: pulse-custom 1s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useMemo, useEffect, useCallback } = React;

    const getHolidays = (year) => {
      const pad = n => String(n).padStart(2, '0');
      const fmt = d => `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
      const getEaster = (y) => {
        const f = Math.floor, G = y % 19, C = f(y / 100);
        const H = (C - f(C / 4) - f((8 * C + 13) / 25) + 19 * G + 15) % 30;
        const I = H - f(H / 28) * (1 - f(29 / (H + 1)) * f((21 - G) / 11));
        const J = (y + f(y / 4) + I + 2 - C + f(C / 4)) % 7;
        const L = I - J, m = 3 + f((L + 40) / 44), d = L + 28 - 31 * f(m / 4);
        return new Date(y, m - 1, d);
      };
      const easter = getEaster(year);
      const easterMon = new Date(easter); easterMon.setDate(easter.getDate() + 1);
      const asc = new Date(easter); asc.setDate(easter.getDate() + 39);
      const pentMon = new Date(easter); pentMon.setDate(easter.getDate() + 50);
      return [`${year}-01-01`, `${year}-05-01`, `${year}-05-08`, `${year}-07-14`, `${year}-08-15`, `${year}-11-01`, `${year}-11-11`, `${year}-12-25`, fmt(easterMon), fmt(asc), fmt(pentMon)];
    };

    const App = () => {
      const [viewDate, setViewDate] = useState(new Date());
      const [syncStatus, setSyncStatus] = useState('synced');
      const [activeTab, setActiveTab] = useState('calendar'); 
      
      const [data, setData] = useState(() => {
        const saved = localStorage.getItem('conges-toulouse-data-v3');
        if (saved) return JSON.parse(saved);
        return {
          targetDate: new Date().toISOString().split('T')[0],
          taken: { cp: 0, rtt: 0, seniority: 0, cet: 0 },
          toCet: { cp: 0, rtt: 0 },
          initialCet: 0,
          calendarLeaves: {},
          vacations: [],
          lastAnnualUpdate: null,
          settings: {
            zone: 'Zone C',
            rateCP: 2.5,
            rateRTT: 1.0,
            theme: 'system',
            expiryMonth: 5, // Mai
            expiryDay: 31
          }
        };
      });

      // Gestion du Thème
      useEffect(() => {
        const root = window.document.documentElement;
        const applyTheme = (t) => {
          if (t === 'dark' || (t === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            root.classList.add('dark');
          } else {
            root.classList.remove('dark');
          }
        };
        
        applyTheme(data.settings?.theme || 'system');

        if (data.settings?.theme === 'system') {
          const mediaQuery = window.matchMedia('(prefers-color-scheme: dark)');
          const handleChange = () => applyTheme('system');
          mediaQuery.addEventListener('change', handleChange);
          return () => mediaQuery.removeEventListener('change', handleChange);
        }
      }, [data.settings?.theme]);

      const fetchVacations = useCallback(async () => {
        setSyncStatus('saving');
        try {
          const currentYear = new Date().getFullYear();
          const zoneParam = encodeURIComponent(data.settings?.zone || 'Zone C');
          const url = `https://data.education.gouv.fr/api/explore/v2.1/catalog/datasets/fr-en-calendrier-scolaire/records?where=zones%3D%22${zoneParam}%22%20AND%20start_date%20%3E%20%22${currentYear - 1}-01-01%22&order_by=start_date%20DESC&limit=100`;
          
          const response = await fetch(url);
          const result = await response.json();
          
          if (result.results) {
            const formatted = result.results.map(r => {
              const rawStart = r.start_date.split('T')[0];
              const rawEnd = r.end_date.split('T')[0];
              const sDate = new Date(rawStart);
              sDate.setDate(sDate.getDate() + 1);
              const pad = n => String(n).padStart(2, '0');
              const fixedStart = `${sDate.getFullYear()}-${pad(sDate.getMonth() + 1)}-${pad(sDate.getDate())}`;
              return { start: fixedStart, end: rawEnd };
            });

            const today = new Date();
            setData(prev => ({
              ...prev,
              vacations: formatted,
              lastAnnualUpdate: today.getMonth() >= 6 ? String(today.getFullYear()) : prev.lastAnnualUpdate
            }));
          }
        } catch (e) {
          console.error("Erreur synchro API:", e);
        } finally {
          setSyncStatus('synced');
        }
      }, [data.settings?.zone]);

      useEffect(() => {
        const currentYearInView = viewDate.getFullYear();
        const today = new Date();
        const isAfterJuly = today.getMonth() >= 6;
        const hasDataForYear = data.vacations?.some(v => v.start.startsWith(String(currentYearInView)));
        const needsAnnualUpdate = isAfterJuly && data.lastAnnualUpdate !== String(today.getFullYear());

        if (!hasDataForYear || needsAnnualUpdate) {
          fetchVacations();
        }
      }, [viewDate.getFullYear(), data.lastAnnualUpdate, fetchVacations]);

      useEffect(() => {
        setSyncStatus('saving');
        localStorage.setItem('conges-toulouse-data-v3', JSON.stringify(data));
        const timeout = setTimeout(() => setSyncStatus('synced'), 300);
        return () => clearTimeout(timeout);
      }, [data]);

      const updateField = (k, v) => setData(prev => ({ ...prev, [k]: v }));
      const updateNested = (c, f, v) => setData(prev => ({ ...prev, [c]: { ...prev[c], [f]: v } }));
      const updateSetting = (f, v) => {
        setData(prev => ({ ...prev, settings: { ...prev.settings, [f]: v } }));
        if (f === 'zone') {
          setData(prev => ({ ...prev, vacations: [], lastAnnualUpdate: null }));
        }
      };

      const totals = useMemo(() => {
        const t = { cp: 0, rtt: 0, seniority: 0, cet: 0 };
        Object.values(data.calendarLeaves || {}).forEach(l => { if (t[l.type] !== undefined) t[l.type] += l.duration; });
        return t;
      }, [data.calendarLeaves]);

      const calcs = useMemo(() => {
        const sel = new Date(data.targetDate);
        const months = Math.max(0, (sel - new Date(sel.getFullYear(), 0, 1)) / (1000 * 60 * 60 * 24 * 30.44));
        const rateCP = data.settings?.rateCP ?? 2.5;
        const rateRTT = data.settings?.rateRTT ?? 1.0;
        const acqCP = months * rateCP, acqRTT = months * rateRTT;
        
        // Calcul jours à risque
        const expiry = new Date(sel.getFullYear(), (data.settings?.expiryMonth ?? 5) - 1, data.settings?.expiryDay ?? 31);
        const isAtRisk = sel > expiry;

        return {
          cp: { acq: acqCP, bal: acqCP - (Number(data.taken.cp) + totals.cp + Number(data.toCet.cp)) },
          rtt: { acq: acqRTT, bal: acqRTT - (Number(data.taken.rtt) + totals.rtt + Number(data.toCet.rtt)) },
          sen: { acq: 1, bal: 1 - (Number(data.taken.seniority) + totals.seniority) },
          cet: { bal: (Number(data.initialCet) || 0) + (Number(data.toCet.cp) + Number(data.toCet.rtt)) - (Number(data.taken.cet) + totals.cet) },
          isAtRisk
        };
      }, [data, totals]);

      const exportToCalendar = () => {
        let ics = "BEGIN:VCALENDAR\nVERSION:2.0\nPRODID:-//Suivi Conges//FR\n";
        Object.entries(data.calendarLeaves).forEach(([dateStr, leave]) => {
          const [y, m, d] = dateStr.split('-');
          const startDate = `${y}${m}${d}`;
          const nextDay = new Date(parseInt(y), parseInt(m) - 1, parseInt(d) + 1);
          const endDate = `${nextDay.getFullYear()}${String(nextDay.getMonth() + 1).padStart(2, '0')}${String(nextDay.getDate()).padStart(2, '0')}`;
          const typeName = leave.type.toUpperCase() === 'SENIORITY' ? 'ANCIENNETÉ' : leave.type.toUpperCase();
          ics += "BEGIN:VEVENT\n";
          ics += `DTSTART;VALUE=DATE:${startDate}\n`;
          ics += `DTEND;VALUE=DATE:${endDate}\n`;
          ics += `SUMMARY:Congé posé : ${typeName}${leave.duration === 0.5 ? ' (Demi-journée)' : ''}\n`;
          ics += "END:VEVENT\n";
        });
        ics += "END:VCALENDAR";
        const blob = new Blob([ics], { type: 'text/calendar;charset=utf-8' });
        const url = URL.createObjectURL(blob);
        const link = document.createElement('a');
        link.href = url;
        link.setAttribute('download', 'mes_conges.ics');
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
      };

      return (
        <div className="min-h-screen bg-slate-50 dark:bg-slate-900 pb-safe-content">
          <header className="bg-indigo-950 text-white pt-safe pb-8 px-5 rounded-b-[40px] shadow-2xl sticky top-0 z-10 transition-colors">
            <div className="flex justify-between items-center mb-6">
              <div className="flex items-center gap-3">
                <h1 className="text-xl font-bold tracking-tight">Congés & CET</h1>
                <div className={`w-2.5 h-2.5 rounded-full transition-colors duration-500 ${syncStatus === 'synced' ? 'bg-emerald-400 shadow-[0_0_8px_rgba(52,211,153,0.6)]' : syncStatus === 'saving' ? 'bg-amber-400 animate-pulse-fast' : 'bg-rose-500'}`}></div>
              </div>
              <div className="text-right">
                <label className="block text-[10px] text-indigo-300 font-bold uppercase mb-1">Projection :</label>
                <div className="relative">
                  <input type="date" value={data.targetDate} onChange={(e) => updateField('targetDate', e.target.value)} className={`bg-indigo-900 text-white rounded-xl border-none p-2 text-xs font-bold appearance-none ${calcs.isAtRisk ? 'ring-2 ring-rose-500 shadow-[0_0_10px_rgba(244,63,94,0.4)]' : ''}`} />
                  {calcs.isAtRisk && (
                    <div className="absolute -bottom-5 right-0 text-[8px] font-black text-rose-400 uppercase animate-pulse">Jours à risque !</div>
                  )}
                </div>
              </div>
            </div>
            <div className="grid grid-cols-2 gap-3">
              <HeaderStat label="Solde CP" val={calcs.cp.bal} acq={calcs.cp.acq} taken={data.taken.cp} onUpdate={v => updateNested('taken', 'cp', v)} />
              <HeaderStat label="Solde RTT" val={calcs.rtt.bal} acq={calcs.rtt.acq} taken={data.taken.rtt} onUpdate={v => updateNested('taken', 'rtt', v)} />
            </div>
          </header>

          <main className="p-4 space-y-4 max-w-md mx-auto">
            {activeTab === 'calendar' ? (
              <React.Fragment>
                <div className="bg-white rounded-2xl p-4 shadow-sm border border-slate-100 flex justify-between items-center transition-colors">
                  <div>
                    <h3 className="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Ancienneté</h3>
                    <div className="text-xl font-black text-slate-800 dark:text-slate-100">{calcs.sen.bal.toFixed(1)} <span className="text-xs font-normal text-slate-300">j.</span></div>
                  </div>
                  <div className="w-24 bg-slate-50 dark:bg-slate-800 p-2 rounded-xl">
                    <label className="text-[7px] font-bold text-slate-400 block mb-0.5 uppercase">Pris (man.)</label>
                    <input 
                      type="number" step="0.5" 
                      value={data.taken.seniority === 0 ? "0" : data.taken.seniority} 
                      onChange={e => updateNested('taken', 'seniority', e.target.value === '' ? '' : parseFloat(e.target.value))} 
                      className="w-full bg-transparent text-xs font-black border-none p-0 focus:outline-none dark:text-white" 
                    />
                  </div>
                </div>

                <div className="bg-slate-900 rounded-3xl p-5 shadow-lg text-white border border-slate-800">
                  <h3 className="text-[11px] font-bold text-slate-400 uppercase tracking-widest mb-1">Solde CET</h3>
                  <div className="text-3xl font-black text-indigo-400 mb-4">{calcs.cet.bal.toFixed(1)} <span className="text-sm font-normal text-white/50">j.</span></div>
                  <div className="grid grid-cols-2 gap-3 pt-3 border-t border-slate-800">
                    <DarkInput label="Stock initial" val={data.initialCet} setVal={v => updateField('initialCet', v)} />
                    <DarkInput label="Pris (manuel)" val={data.taken.cet} setVal={v => updateNested('taken', 'cet', v)} />
                    <DarkInput label="+ RTT versés" val={data.toCet.rtt} setVal={v => updateNested('toCet', 'rtt', v)} highlight />
                    <DarkInput label="+ CP versés" val={data.toCet.cp} setVal={v => updateNested('toCet', 'cp', v)} highlight />
                  </div>
                </div>

                <CalendarWidget 
                  view={viewDate} 
                  setView={setViewDate} 
                  leaves={data.calendarLeaves} 
                  setLeaves={v => updateField('calendarLeaves', v)} 
                  vacations={data.vacations || []}
                  zoneLabel={data.settings?.zone || 'Zone C'}
                  onExport={exportToCalendar} 
                />
              </React.Fragment>
            ) : (
              <SettingsPage settings={data.settings} updateSetting={updateSetting} />
            )}
          </main>

          <nav className="fixed bottom-0 left-0 right-0 bg-white border-t border-slate-200 px-6 py-3 flex justify-around items-center z-20 pb-[calc(12px+var(--sab,0px))] transition-colors">
            <TabButton active={activeTab === 'calendar'} label="Calendrier" icon="calendar" onClick={() => setActiveTab('calendar')} />
            <TabButton active={activeTab === 'settings'} label="Paramètres" icon="settings" onClick={() => setActiveTab('settings')} />
          </nav>
        </div>
      );
    };

    const TabButton = ({ active, label, icon, onClick }) => (
      <button onClick={onClick} className={`flex flex-col items-center gap-1 transition-all ${active ? 'text-indigo-600' : 'text-slate-400'}`}>
        <div className={`p-1 rounded-xl ${active ? 'bg-indigo-50 dark:bg-indigo-900/30' : ''}`}>
          {icon === 'calendar' ? (
            <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" /></svg>
          ) : (
            <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" /><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /></svg>
          )}
        </div>
        <span className="text-[10px] font-black uppercase tracking-tighter">{label}</span>
      </button>
    );

    const SettingsPage = ({ settings, updateSetting }) => {
      const zoneInfo = {
        'Zone A': 'Besançon, Bordeaux, Clermont-Ferrand, Dijon, Grenoble, Limoges, Lyon, Poitiers.',
        'Zone B': 'Aix-Marseille, Amiens, Lille, Nancy-Metz, Nantes, Nice, Normandie, Orléans-Tours, Reims, Rennes, Strasbourg.',
        'Zone C': 'Créteil, Montpellier, Paris, Toulouse, Versailles.'
      };

      const months = ["Janvier", "Février", "Mars", "Avril", "Mai", "Juin", "Juillet", "Août", "Septembre", "Octobre", "Novembre", "Décembre"];

      return (
        <div className="space-y-6 py-2 animate-in fade-in slide-in-from-bottom-4 duration-300">
          <section>
            <h2 className="text-sm font-black text-slate-800 dark:text-slate-200 uppercase tracking-widest mb-4 px-2">Affichage</h2>
            <div className="bg-white rounded-3xl p-5 shadow-sm border border-slate-100 space-y-4 transition-colors">
              <div>
                <label className="block text-[10px] font-bold text-slate-400 uppercase mb-3">Thème de l'application</label>
                <div className="grid grid-cols-3 gap-2">
                  {[
                    {id: 'light', label: 'Clair'},
                    {id: 'dark', label: 'Sombre'},
                    {id: 'system', label: 'Auto'}
                  ].map(t => (
                    <button 
                      key={t.id} 
                      onClick={() => updateSetting('theme', t.id)}
                      className={`py-3 rounded-2xl text-xs font-black transition-all ${settings.theme === t.id ? 'bg-indigo-600 text-white shadow-lg' : 'bg-slate-50 dark:bg-slate-700 text-slate-400'}`}
                    >
                      {t.label}
                    </button>
                  ))}
                </div>
              </div>
            </div>
          </section>

          <section>
            <h2 className="text-sm font-black text-slate-800 dark:text-slate-200 uppercase tracking-widest mb-4 px-2">Gestion Péremption</h2>
            <div className="bg-white rounded-3xl p-5 shadow-sm border border-slate-100 space-y-5 transition-colors">
              <div className="flex justify-between items-center">
                <div className="flex-1 mr-4">
                  <span className="block text-[11px] font-black text-slate-700 dark:text-slate-200">Date limite annuelle</span>
                  <span className="text-[10px] text-slate-400">Date à laquelle les congés expirent</span>
                </div>
                <div className="flex gap-2">
                  <select 
                    value={settings.expiryDay} 
                    onChange={e => updateSetting('expiryDay', parseInt(e.target.value))}
                    className="bg-slate-50 dark:bg-slate-700 p-2 rounded-xl text-xs font-bold dark:text-white border-none"
                  >
                    {[...Array(31)].map((_, i) => <option key={i+1} value={i+1}>{i+1}</option>)}
                  </select>
                  <select 
                    value={settings.expiryMonth} 
                    onChange={e => updateSetting('expiryMonth', parseInt(e.target.value))}
                    className="bg-slate-50 dark:bg-slate-700 p-2 rounded-xl text-xs font-bold dark:text-white border-none"
                  >
                    {months.map((m, i) => <option key={i+1} value={i+1}>{m}</option>)}
                  </select>
                </div>
              </div>
            </div>
          </section>

          <section>
            <h2 className="text-sm font-black text-slate-800 dark:text-slate-200 uppercase tracking-widest mb-4 px-2">Scolarité</h2>
            <div className="bg-white rounded-3xl p-5 shadow-sm border border-slate-100 space-y-4 transition-colors">
              <div>
                <label className="block text-[10px] font-bold text-slate-400 uppercase mb-3">Zone de vacances scolaires</label>
                <div className="grid grid-cols-3 gap-2">
                  {['Zone A', 'Zone B', 'Zone C'].map(z => (
                    <button 
                      key={z} 
                      onClick={() => updateSetting('zone', z)}
                      className={`py-3 rounded-2xl text-xs font-black transition-all ${settings.zone === z ? 'bg-indigo-600 text-white shadow-lg' : 'bg-slate-50 dark:bg-slate-700 text-slate-400'}`}
                    >
                      {z}
                    </button>
                  ))}
                </div>
                <p className="mt-3 text-[10px] text-slate-400 leading-relaxed italic">{zoneInfo[settings.zone] || zoneInfo['Zone C']}</p>
              </div>
            </div>
          </section>

          <section>
            <h2 className="text-sm font-black text-slate-800 dark:text-slate-200 uppercase tracking-widest mb-4 px-2">Acquisition Mensuelle</h2>
            <div className="bg-white rounded-3xl p-5 shadow-sm border border-slate-100 space-y-5 transition-colors">
              <div className="flex justify-between items-center">
                <div>
                  <span className="block text-[11px] font-black text-slate-700 dark:text-slate-200">Congés Payés (CP)</span>
                  <span className="text-[10px] text-slate-400">Jours acquis par mois</span>
                </div>
                <input 
                  type="number" step="0.1" 
                  value={settings.rateCP} 
                  onChange={e => updateSetting('rateCP', e.target.value === '' ? '' : parseFloat(e.target.value))}
                  className="w-20 bg-slate-50 dark:bg-slate-700 text-right p-3 rounded-xl font-black text-indigo-600 border-none outline-none" 
                />
              </div>
              <div className="flex justify-between items-center pt-5 border-t border-slate-50 dark:border-slate-700">
                <div>
                  <span className="block text-[11px] font-black text-slate-700 dark:text-slate-200">RTT</span>
                  <span className="text-[10px] text-slate-400">Jours acquis par mois</span>
                </div>
                <input 
                  type="number" step="0.1" 
                  value={settings.rateRTT} 
                  onChange={e => updateSetting('rateRTT', e.target.value === '' ? '' : parseFloat(e.target.value))}
                  className="w-20 bg-slate-50 dark:bg-slate-700 text-right p-3 rounded-xl font-black text-emerald-600 border-none outline-none" 
                />
              </div>
            </div>
          </section>
          
          <div className="px-4 py-8 text-center">
              <p className="text-[10px] text-slate-300 font-bold uppercase tracking-widest">Version 3.0 • Paramètres Avancés</p>
          </div>
        </div>
      );
    };

    const HeaderStat = ({ label, val, acq, taken, onUpdate }) => (
      <div className="bg-white/5 p-3 rounded-2xl border border-white/10 flex flex-col">
        <h3 className="text-[10px] font-bold uppercase mb-1 opacity-50">{label}</h3>
        <div className="text-xl font-black tracking-tight">{val.toFixed(1)} <span className="text-xs font-normal opacity-30">j.</span></div>
        <p className="text-[8px] mt-1 mb-2 opacity-30 font-bold tracking-tighter uppercase">Acquis : {acq.toFixed(1)}</p>
        <div className="mt-auto bg-black/30 p-1.5 rounded-xl">
            <label className="block text-[7px] font-bold text-indigo-400 uppercase mb-0.5">Ajustement</label>
            <input 
              type="number" step="0.5" 
              value={taken === 0 ? "0" : taken} 
              onChange={e => onUpdate(e.target.value === '' ? '' : parseFloat(e.target.value))} 
              className="w-full bg-transparent text-[11px] font-black text-white border-none p-0 focus:outline-none" 
            />
        </div>
      </div>
    );

    const DarkInput = ({ label, val, setVal, highlight }) => (
      <div className="bg-white/5 p-2 rounded-xl">
        <label className={`text-[8px] font-bold uppercase block mb-0.5 ${highlight ? 'text-indigo-400' : 'text-slate-500'}`}>{label}</label>
        <input 
          type="number" step="0.5" 
          value={val === 0 ? "0" : val} 
          onChange={e => setVal(e.target.value === '' ? '' : parseFloat(e.target.value))} 
          className="w-full bg-transparent text-white text-xs font-bold border-none p-0 focus:outline-none" 
        />
      </div>
    );

    const CalendarWidget = ({ view, setView, leaves, setLeaves, vacations, zoneLabel, onExport }) => {
      const [type, setType] = useState('cp');
      const [dur, setDur] = useState(1);
      const y = view.getFullYear(), m = view.getMonth();
      const days = new Date(y, m+1, 0).getDate();
      const start = (new Date(y, m, 1).getDay() + 6) % 7;
      const months = ["Janvier", "Février", "Mars", "Avril", "Mai", "Juin", "Juillet", "Août", "Septembre", "Octobre", "Novembre", "Décembre"];
      const holidays = useMemo(() => getHolidays(y), [y]);
      
      const today = new Date();
      const todayId = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;

      const typeStyles = {
        cp: 'bg-indigo-600 text-white shadow-lg shadow-indigo-200',
        rtt: 'bg-emerald-500 text-white shadow-lg shadow-emerald-200',
        seniority: 'bg-amber-500 text-white shadow-lg shadow-amber-200',
        cet: 'bg-slate-900 text-white shadow-lg shadow-slate-300'
      };

      const toggle = (d) => {
        const dayOfWeek = new Date(y, m, d).getDay();
        if (dayOfWeek === 0 || dayOfWeek === 6) return;
        const id = `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
        if (holidays.includes(id)) return;
        
        if(navigator.vibrate) navigator.vibrate(10);
        
        const next = { ...leaves };
        if (next[id] && next[id].type === type) delete next[id];
        else next[id] = { type, duration: dur };
        setLeaves(next);
      };

      return (
        <div className="bg-white rounded-3xl p-5 shadow-sm border border-slate-100 transition-colors">
          <div className="flex justify-between items-center mb-6 px-2">
             <button onClick={() => setView(new Date(y, m-1, 1))} className="p-2 bg-slate-50 dark:bg-slate-700 rounded-xl text-slate-400 active:bg-slate-200 transition-colors"><svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2.5" d="M15 19l-7-7 7-7" /></svg></button>
             <span className="text-xs font-black uppercase tracking-widest text-slate-800 dark:text-slate-200">{months[m]} {y}</span>
             <button onClick={() => setView(new Date(y, m+1, 1))} className="p-2 bg-slate-50 dark:bg-slate-700 rounded-xl text-slate-400 active:bg-slate-200 transition-colors"><svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2.5" d="M9 5l7 7-7 7" /></svg></button>
          </div>
          <div className="grid grid-cols-7 gap-1.5 mb-6">
            {['L','M','M','J','V','S','D'].map(d => <div key={d} className="text-center text-[9px] font-black text-slate-200 py-1">{d}</div>)}
            {Array.from({length:start}).map((_,i) => <div key={i} />)}
            {Array.from({length:days}).map((_,i) => {
              const d = i+1; const id = `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
              const l = leaves[id]; 
              const isHoliday = holidays.includes(id); 
              const isVacation = vacations.some(v => id >= v.start && id <= v.end);
              const isToday = id === todayId;
              const dayOfWeek = new Date(y, m, d).getDay();
              const isWeekend = dayOfWeek === 0 || dayOfWeek === 6;
              
              let bgColor = 'bg-slate-50 dark:bg-slate-700 text-slate-600 dark:text-slate-300';
              if (isWeekend) bgColor = 'bg-slate-50 dark:bg-slate-800 opacity-40 text-slate-400 cursor-not-allowed'; 
              else if (isHoliday) bgColor = 'bg-rose-50 dark:bg-rose-900/30 text-rose-400';
              else if (l) bgColor = typeStyles[l.type];
              
              return (
                <button key={d} onClick={() => toggle(d)} className={`relative flex flex-col items-center justify-center h-11 rounded-2xl text-[11px] font-black transition-all active:scale-90 ${bgColor} ${isToday && !l ? 'border-2 border-indigo-200' : ''}`}>
                  {d}{l?.duration === 0.5 && '*'}
                  {isHoliday && <span className="text-[5px] absolute bottom-1 font-bold">FÉRIÉ</span>}
                  {isVacation && !l && !isHoliday && <div className="absolute top-1 right-1 w-1.5 h-1.5 bg-indigo-300 rounded-full"></div>}
                </button>
              );
            })}
          </div>
          <div className="space-y-3">
            <div className="grid grid-cols-4 gap-1.5">
              {['cp', 'rtt', 'seniority', 'cet'].map(t => (
                <button 
                  key={t} 
                  onClick={() => setType(t)} 
                  className={`py-2.5 rounded-xl text-[9px] font-black uppercase transition-all ${type === t ? typeStyles[t] + ' scale-105' : 'bg-slate-50 dark:bg-slate-700 text-slate-400'}`}
                >
                  {t === 'seniority' ? 'ANC.' : t}
                </button>
              ))}
            </div>
            <div className="flex gap-1.5">
              {[1, 0.5].map(v => <button key={v} onClick={() => setDur(v)} className={`flex-1 py-2 rounded-xl text-[9px] font-black uppercase transition-all ${dur === v ? 'bg-indigo-100 dark:bg-indigo-900 text-indigo-700 dark:text-indigo-200' : 'bg-slate-50 dark:bg-slate-700 text-slate-400'}`}>{v === 1 ? '1 Jour' : '0.5 Jour'}</button>)}
            </div>
            <div className="flex items-center justify-between pt-2">
              <div className="flex items-center gap-2 text-[9px] text-slate-300 font-bold uppercase italic">
                <div className="w-1.5 h-1.5 bg-indigo-300 rounded-full"></div> Vacances ({zoneLabel})
              </div>
              <button onClick={onExport} className="flex items-center gap-1.5 px-3 py-1.5 bg-slate-50 dark:bg-slate-700 text-indigo-500 rounded-lg text-[9px] font-black uppercase active:bg-indigo-50 transition-colors border border-slate-100 dark:border-slate-600">
                <svg className="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2.5" d="M8 7H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-3m-1 4l-3 3m0 0l-3-3m3 3V4" /></svg>
                Export ICS
              </button>
            </div>
          </div>
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);

    window.addEventListener('load', () => {
      const manifest = {
        name: "Gestion Congés",
        short_name: "Congés",
        description: "Suivi des congés perso",
        start_url: window.location.href,
        display: "standalone",
        background_color: "#1e1b4b",
        theme_color: "#1e1b4b",
        icons: [{ src: "https://cdn-icons-png.flaticon.com/512/3652/3652191.png", sizes: "512x512", type: "image/png", purpose: "any maskable" }]
      };
      const manifestBlob = new Blob([JSON.stringify(manifest)], {type: 'application/json'});
      document.getElementById('manifest-link').href = URL.createObjectURL(manifestBlob);
    });
  </script>
</body>
</html>
